<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product Portfolio Executive Dashboard</title>

<script src="html2canvas.min.js"></script>

<style>
    /* ... [YOUR EXISTING STYLES REMAIN UNCHANGED] ... */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body { background: #f4f6f9; padding: 25px; }
    .action-bar { text-align: center; margin-bottom: 25px; display: flex; flex-wrap: wrap; justify-content: center; align-items: center; gap: 10px; }
    .action-bar button, .action-bar select { background: #0052cc; color: white; border: none; padding: 12px 18px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
    .btn-mail { background: #e83e8c !important; }
    .header { background: #0052cc; color: white; text-align: center; padding: 25px; border-radius: 15px; margin-bottom: 20px; }
    .container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }
    .team-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,.1); }
    .status-box { display: flex; justify-content: space-between; align-items: center; padding: 12px 15px; border-radius: 10px; color: white; margin-bottom: 10px; }
    .progress { background: #2196f3; } .completed { background: #28a745; } .blocker { background: #dc3545; } .notstarted { background: #ff9800; }
    .editable { width: 80px; border: 1px solid rgba(255, 255, 255, 0.3); background: transparent; color: white; font-size: 20px; text-align: right; font-weight: bold; border-radius: 5px; padding: 2px 5px; }
    .summary { margin-top: 25px; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,.1); }
    .summary-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    .summary-card { padding: 20px; color: white; border-radius: 10px; text-align: center; }
    .summary-output { width: 100%; min-height: 350px; margin-top: 15px; border: 1px solid #ccc; border-radius: 10px; padding: 20px; font-size: 15px; line-height: 1.6; background: #fafafa; color: #333; white-space: pre-wrap; }
    .no-print { display: block; }
</style>
</head>
<body>

<div id="dashboard">
    <div class="action-bar no-print">
        <button onclick="updateDashboard()">🔄 Update Dashboard</button>
        <button class="btn-mail" onclick="copyForMailbox()">📧 Copy for Mail Box</button>
        <button onclick="copyRichText()">📋 Copy Rich Text</button>
        <button onclick="copyPlainText()">📄 Copy Plain Text</button>
        <select id="imageScale">
            <option value="1">Standard (1x)</option>
            <option value="2" selected>High Quality (2x)</option>
        </select>
        <button onclick="downloadPNG()">📸 Download PNG</button>
    </div>

    <div id="capture-area">
        <div class="header">
            <h1>📊 Product Portfolio Weekly Status Report</h1>
        </div>
        <div class="container">
            </div>
        <div class="summary">
            <h2>📈 Overall Portfolio Summary</h2>
            <div class="summary-grid">
                <div class="summary-card progress"><h3 id="totalProgress">0</h3><p>In Progress</p></div>
                <div class="summary-card completed"><h3 id="totalCompleted">0</h3><p>Completed</p></div>
                <div class="summary-card blocker"><h3 id="totalBlocked">0</h3><p>Blocked</p></div>
                <div class="summary-card notstarted"><h3 id="totalNotStarted">0</h3><p>Yet To Start</p></div>
            </div>
        </div>
    </div>

    <div class="summary no-print">
        <h2>📝 Executive Team Summary Output</h2>
        <div id="summaryOutput" class="summary-output" contenteditable="true"></div>
    </div>
</div>

<script>
    // MODERNIZED JAVASCRIPT
    async function copyRichText() {
        const div = document.getElementById('summaryOutput');
        try {
            const blob = new Blob([div.innerHTML], { type: 'text/html' });
            const data = [new ClipboardItem({ 'text/html': blob })];
            await navigator.clipboard.write(data);
            alert("✅ Rich text summary copied!");
        } catch (err) {
            alert("❌ Clipboard access denied or unsupported.");
        }
    }

    async function copyPlainText() {
        const text = document.getElementById('summaryOutput').innerText;
        try {
            await navigator.clipboard.writeText(text);
            alert("📄 Plain text summary copied!");
        } catch (err) { alert("❌ Copy failed."); }
    }

    function downloadPNG() {
        if (typeof html2canvas === 'undefined') {
            alert("Error: html2canvas.min.js not found in local folder!");
            return;
        }

        const noPrint = document.querySelectorAll('.no-print');
        noPrint.forEach(el => el.style.display = 'none');

        html2canvas(document.getElementById('capture-area'), {
            backgroundColor: '#f4f6f9',
            scale: parseFloat(document.getElementById('imageScale').value)
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = `Portfolio_Dashboard_${new Date().toISOString().slice(0,10)}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            noPrint.forEach(el => el.style.display = '');
        });
    }

    // [KEEP YOUR EXISTING updateDashboard() AND generateNarrative() FUNCTIONS HERE]
</script>
</body>
</html>
